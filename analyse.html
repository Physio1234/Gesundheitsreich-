<body data-page="analyse">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">EP</div>
        <div>
          <h1>Elite Praxis Cockpit</h1>
          <p>Analyse</p>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link" href="umsatz.html">Umsatz</a>
        <a class="nav-link" href="provision.html">Provision</a>

      <section class="card">
        <div class="card-header"><h3>Vergleich</h3></div>
        <div class="table-wrap">
          <table>
            <tbody id="analysisTableBody"></tbody>
          </table>
        </div>

  <script src="js/storage.js"></script>

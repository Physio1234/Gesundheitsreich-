// ── GEBURTSTAG HELPER ─────────────────────────────────────────
function daysUntilBday(geb) {
  if (!geb) return null;
  const [d, m] = geb.split(".").map(Number);
  const today = new Date();
  let next = new Date(today.getFullYear(), m - 1, d);
  if (next < today) next.setFullYear(today.getFullYear() + 1);
  return Math.round((next - today) / 86400000);
}
function bdayLabel(geb) {
  if (!geb) return null;
  const days = daysUntilBday(geb);
  if (days === 0) return "🎂 Heute!";
  if (days === 1) return "🎁 Morgen";
  if (days <= 7) return `🎂 in ${days} Tagen`;
  if (days <= 30) return `in ${days} Tagen`;
  return null; // nur anzeigen wenn bald
}
function alter(geb) {
  if (!geb) return null;
  const [d, m, y] = geb.split(".").map(Number);
  const today = new Date();
  let age = today.getFullYear() - y;
  if (today.getMonth() + 1 < m || today.getMonth() + 1 === m && today.getDate() < d) age--;
  return age;
}
function berechne(ma, istUmsatz, cfg) {
  const satz = ma.provSatz !== null && ma.provSatz !== undefined ? ma.provSatz : cfg.provSatz;
  const ziel = cfg.basisZiel * (ma.h / 40);
  const schwelle = ziel * (1 + cfg.provSchwelle / 100);
  const prov = istUmsatz > schwelle ? (istUmsatz - schwelle) * (satz / 100) : 0;
  const kosten = ma.gehalt + (ma.fw ? cfg.fwKosten : 0);
  const lkq = istUmsatz > 0 ? Math.round(kosten / istUmsatz * 100) : null;
  const diff = istUmsatz - ziel;
  const auslPct = istUmsatz > 0 ? Math.round(istUmsatz / ziel * 100) : 0;
  return {
    ziel,
    prov,
    lkq,
    diff,
    auslPct,
    kosten,
    satz
  };
}

// ── FIREBASE HELPERS ─────────────────────────────────────────
async function fbRead(path) {
  try {
    const r = await fetch(`${DB_URL}/${path}.json`);
    if (!r.ok) return null;
    return await r.json();
  } catch {
    return null;
  }
}
async function fbWrite(path, data) {
  try {
    const r = await fetch(`${DB_URL}/${path}.json`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
    return r.ok;
  } catch {
    return false;
  }
}
async function fbPatch(path, data) {
  try {
    const r = await fetch(`${DB_URL}/${path}.json`, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    });
    return r.ok;
  } catch {
    return false;
  }
}

// ── MONAT UTILS ──────────────────────────────────────────────
function monatKey(d = new Date()) {
  return `${d.getFullYear()}_${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function monatLabel(key) {
  const [y, m] = key.split("_");
  return new Date(+y, +m - 1).toLocaleDateString("de-DE", {
    month: "long",
    year: "numeric"
  });
}
function letzteMonatek(n = 6) {
  const keys = [];
  const d = new Date();
  for (let i = 0; i < n; i++) {
    keys.unshift(monatKey(d));
    d.setMonth(d.getMonth() - 1);
  }
  return keys;
}

<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elite Praxis Cockpit – Einstellungen</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="settings">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">EP</div>
        <div>
          <h1>Elite Praxis Cockpit</h1>
          <p>Einstellungen</p>
        </div>
      </div>
      <nav class="nav">
        <a class="nav-link" href="index.html">Dashboard</a>
        <a class="nav-link" href="umsatz.html">Umsatz</a>
        <a class="nav-link" href="provision.html">Provision</a>
        <a class="nav-link" href="mitarbeiter.html">Mitarbeiter</a>
        <a class="nav-link" href="analyse.html">Analyse</a>
        <a class="nav-link active" href="einstellungen.html">Einstellungen</a>
      </nav>
    </aside>

    <main class="content">
      <header class="page-header">
        <div>
          <h2>Einstellungen</h2>
          <p>Zentrale Standardwerte und sicherer Reset.</p>
        </div>
      </header>

      <section class="grid cols-2">
        <article class="card">
          <div class="card-header"><h3>Standards</h3></div>
          <form class="form-grid">
            <label>
              Lohnnebenkosten (%)
              <input type="number" id="settingsAncillaryRate" min="0" max="100" step="0.1" />
            </label>
            <label>
              Ziel-Auslastung (%)
              <input type="number" id="settingsTargetUtilization" min="0" max="100" step="1" />
            </label>
            <label>
              Ziel-Kostenquote (%)
              <input type="number" id="settingsTargetCostRate" min="0" max="100" step="1" />
            </label>
          </form>
          <div class="button-row">
            <button type="button" class="primary-button" id="saveSettingsButton">Speichern</button>
            <button type="button" class="danger-button" id="resetAppButton">Komplett zurücksetzen</button>
          </div>
          <div class="notice" id="settingsNotice"></div>
        </article>

        <article class="card">
          <div class="card-header"><h3>Systemstatus</h3></div>
          <div class="stack">
            <div class="result-row"><span>App-Version</span><strong>1.0.0</strong></div>
            <div class="result-row"><span>Speicher-Schlüssel</span><strong>elitePraxisCockpit</strong></div>
            <div class="result-row"><span>Selbstprüfung</span><strong id="settingsDiagnosticsResult">nicht ausgeführt</strong></div>
          </div>
          <button type="button" class="secondary-button" id="runSettingsDiagnosticsButton">Selbstprüfung starten</button>
        </article>
      </section>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/calculations.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/core.js"></script>
  <script src="js/settings-page.js"></script>
</body>
</html>

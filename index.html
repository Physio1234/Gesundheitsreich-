<!DOCTYPE html>
<html>
<body style="background:#111;color:white;text-align:center;font-family:Arial">

<h2>📸 Umsatz Scanner</h2>

<input type="file" id="fileInput"><br><br>
<button onclick="upload()">Start</button>

<div id="status"></div>
<div id="result"></div>

<script>

const WORKER_URL = "https://odd-mountain-6332-lingering-snow-c9b2.workers.dev";
const TOKEN = "gesundheitsreich-2026";

async function upload(){
  const file = document.getElementById("fileInput").files[0];
  if(!file) return alert("Foto wählen");

  document.getElementById("status").innerHTML = "⏳ läuft...";

  const reader = new FileReader();
  reader.readAsDataURL(file);

  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];

    const res = await fetch(WORKER_URL + "/api/analyze-photo", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-app-token":TOKEN
      },
      body: JSON.stringify({
        imageBase64: base64,
        mediaType: file.type
      })
    });

    const data = await res.json();

    if(!res.ok){
      document.getElementById("status").innerHTML = "❌ Fehler";
      console.log(data);
      return;
    }

    document.getElementById("status").innerHTML = "✅ fertig";

    let html="";
    data.forEach(d=>{
      html += `<div>${d.name} - ${d.umsatz}€</div>`;
    });

    document.getElementById("result").innerHTML = html;
  };
}

</script>

</body>
</html>

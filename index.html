<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Umsatz-Foto Upload</title>
  <style>
    :root {
      --bg: #0b1220;
      --card: #121a2b;
      --card-2: #1a2438;
      --text: #eef3ff;
      --muted: #9fb0d1;
      --line: #2a3856;
      --accent: #4fd1c5;
      --accent-2: #3aa9ff;
      --danger: #ff6b6b;
      --warning: #f6c453;
      --success: #44d17a;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #08101d 0%, #0f1727 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    p.sub {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      background: var(--card-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 15px;
      outline: none;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button, .fake-upload {
      border: 0;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #06111f;
    }

    .secondary {
      background: var(--card-2);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .danger {
      background: var(--danger);
      color: white;
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #0d1525;
      border: 1px solid var(--line);
      color: var(--muted);
      min-height: 46px;
    }

    .preview {
      width: 100%;
      max-height: 380px;
      object-fit: contain;
      background: #0a1120;
      border: 1px solid var(--line);
      border-radius: 18px;
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 16px;
      background: #0d1524;
      border: 1px solid var(--line);
    }

    .table th,
    .table td {
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .table th {
      color: var(--muted);
      font-size: 13px;
      background: #101a2d;
    }

    .pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #13253a;
      color: var(--accent);
      border: 1px solid #234260;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .sum {
      font-size: 20px;
      font-weight: 800;
      margin-top: 10px;
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 760px) {
      .grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Umsatz-Foto Upload</h1>
      <p class="sub">
        Foto hochladen, an deinen Cloudflare Worker senden und erkannte Mitarbeiter-Umsätze direkt prüfen.
      </p>
    </div>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label for="standort">Standort</label>
          <select id="standort">
            <option value="Lübeck">Lübeck</option>
            <option value="Mölln">Mölln</option>
            <option value="Schwarzenbek">Schwarzenbek</option>
            <option value="Hamburg">Hamburg</option>
          </select>
        </div>
        <div class="field">
          <label for="employeeList">Mitarbeiterliste, getrennt mit Komma</label>
          <input id="employeeList" type="text" value="Inga, Annemai, Alina, Maja, Lea, Marcel, Robin" />
        </div>
      </div>

      <div class="field" style="margin-top:14px;">
        <label for="notes">Hinweis</label>
        <textarea id="notes" readonly>Worker-URL und Token sind schon eingetragen. Wenn du später einen anderen Worker nutzt, ändere nur die cfg unten im Script.</textarea>
      </div>

      <div class="btns">
        <label class="fake-upload primary" for="photoInput">Foto auswählen</label>
        <input id="photoInput" type="file" accept="image/*" />
        <button id="analyzeBtn" class="secondary" disabled>Foto analysieren</button>
        <button id="clearBtn" class="danger" type="button">Zurücksetzen</button>
      </div>

      <div id="status" class="status">Bereit.</div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
        <div>
          <div class="pill">Vorschau</div>
        </div>
        <div class="note">Am besten frontal, ohne Spiegelung, mit kompletter Tabelle.</div>
      </div>
      <img id="preview" class="preview" alt="Bildvorschau" />
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
        <div class="pill">Ergebnis</div>
        <div id="countInfo" class="note">Noch keine Daten.</div>
      </div>
      <div style="overflow:auto;">
        <table class="table" id="resultTable">
          <thead>
            <tr>
              <th>Mitarbeiter</th>
              <th>Umsatz</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td colspan="2" class="note">Noch keine Analyse durchgeführt.</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div id="sum" class="sum"></div>
    </div>
  </div>

  <script>
    const cfg = {
      workerUrl: "https://odd-mountain-6332-lingering-snow-c9b2.workers.dev",
      workerToken: "gesundheitsreich-2026"
    };

    const els = {
      standort: document.getElementById('standort'),
      employeeList: document.getElementById('employeeList'),
      photoInput: document.getElementById('photoInput'),
      analyzeBtn: document.getElementById('analyzeBtn'),
      clearBtn: document.getElementById('clearBtn'),
      status: document.getElementById('status'),
      preview: document.getElementById('preview'),
      resultTableBody: document.querySelector('#resultTable tbody'),
      countInfo: document.getElementById('countInfo'),
      sum: document.getElementById('sum')
    };

    let currentFile = null;

    function setStatus(text, isError = false) {
      els.status.textContent = text;
      els.status.style.color = isError ? '#ffd2d2' : 'var(--muted)';
      els.status.style.borderColor = isError ? 'rgba(255,107,107,.45)' : 'var(--line)';
    }

    function eur(value) {
      return new Intl.NumberFormat('de-DE', {
        style: 'currency',
        currency: 'EUR',
        maximumFractionDigits: 0
      }).format(value || 0);
    }

    function getEmployees() {
      return els.employeeList.value
        .split(',')
        .map(v => v.trim())
        .filter(Boolean);
    }

    function resetResults() {
      els.resultTableBody.innerHTML = '<tr><td colspan="2" class="note">Noch keine Analyse durchgeführt.</td></tr>';
      els.countInfo.textContent = 'Noch keine Daten.';
      els.sum.textContent = '';
    }

    async function fileToDataUrl(file) {
      return await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden.'));
        reader.readAsDataURL(file);
      });
    }

    async function loadImage(src) {
      return await new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error('Bild konnte nicht geladen werden.'));
        img.src = src;
      });
    }

    async function preparePhoto(file) {
      const dataUrl = await fileToDataUrl(file);
      const img = await loadImage(dataUrl);

      const maxSide = 1600;
      let targetW = img.width;
      let targetH = img.height;

      if (img.width > img.height && img.width > maxSide) {
        targetW = maxSide;
        targetH = Math.round(img.height * (maxSide / img.width));
      } else if (img.height >= img.width && img.height > maxSide) {
        targetH = maxSide;
        targetW = Math.round(img.width * (maxSide / img.height));
      }

      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = targetW;
      canvas.height = targetH;
      ctx.drawImage(img, 0, 0, targetW, targetH);

      return {
        dataUrl: canvas.toDataURL('image/jpeg', 0.9),
        width: canvas.width,
        height: canvas.height
      };
    }

    function renderResults(rows) {
      if (!Array.isArray(rows) || !rows.length) {
        els.resultTableBody.innerHTML = '<tr><td colspan="2" class="note">Keine Daten erkannt.</td></tr>';
        els.countInfo.textContent = '0 Mitarbeiter erkannt';
        els.sum.textContent = '';
        return;
      }

      els.resultTableBody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.name || '')}</td>
          <td>${eur(Number(row.umsatz || 0))}</td>
        </tr>
      `).join('');

      const sum = rows.reduce((acc, row) => acc + Number(row.umsatz || 0), 0);
      els.countInfo.textContent = `${rows.length} Mitarbeiter erkannt`;
      els.sum.textContent = `Gesamt: ${eur(sum)}`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    els.photoInput.addEventListener('change', async (event) => {
      const file = event.target.files?.[0];
      currentFile = file || null;
      resetResults();

      if (!file) {
        els.preview.removeAttribute('src');
        els.analyzeBtn.disabled = true;
        setStatus('Keine Datei ausgewählt.');
        return;
      }

      try {
        const dataUrl = await fileToDataUrl(file);
        els.preview.src = dataUrl;
        els.analyzeBtn.disabled = false;
        setStatus('Foto geladen. Jetzt auf „Foto analysieren“ klicken.');
      } catch (error) {
        els.analyzeBtn.disabled = true;
        setStatus(error.message, true);
      }
    });

    els.analyzeBtn.addEventListener('click', async () => {
      if (!currentFile) {
        setStatus('Bitte zuerst ein Foto auswählen.', true);
        return;
      }

      try {
        setStatus('Foto wird vorbereitet...');

        const prepared = await preparePhoto(currentFile);
        const base64 = String(prepared.dataUrl).split(',')[1];
        const employees = getEmployees();
        const workerUrl = cfg.workerUrl.replace(/\/+$/, '');

        setStatus('Foto wird an den Worker gesendet...');

        const response = await fetch(workerUrl + '/api/analyze-photo', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-app-token': cfg.workerToken
          },
          body: JSON.stringify({
            imageBase64: base64,
            mediaType: 'image/jpeg',
            standort: els.standort.value,
            employees
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.error || 'Analyse fehlgeschlagen.');
        }

        renderResults(data);
        setStatus('Analyse erfolgreich abgeschlossen.');
      } catch (error) {
        renderResults([]);
        setStatus(error.message || 'Unbekannter Fehler.', true);
        console.error(error);
      }
    });

    els.clearBtn.addEventListener('click', () => {
      currentFile = null;
      els.photoInput.value = '';
      els.preview.removeAttribute('src');
      els.analyzeBtn.disabled = true;
      resetResults();
      setStatus('Zurückgesetzt.');
    });
  </script>
</body>
</html>

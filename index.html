<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dein Gesundheitsreich</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --teal:#009A93;--teal-dk:#007870;--teal-lt:#E1F5EE;--teal-mid:#b0dbd9;
  --dark:#1a2e2b;--dark2:#243b37;--dark3:#2f4a45;
  --card:#ffffff;--bg:#f4f9f8;--text:#1a2e2b;--sub:#5a7570;
  --border:rgba(0,154,147,.15);--border2:rgba(0,154,147,.25);
  --red:#E24B4A;--red-lt:#FCEBEB;--grn:#0F6E56;--grn-lt:#E1F5EE;
  --amb:#BA7517;--amb-lt:#FAEEDA;--gold:#7A5C00;--gold-lt:#FFF8E1;
  --pur:#7F77DD;--pur-lt:#EEEDFE;
  --r:14px;--shadow:0 2px 16px rgba(0,154,147,.08)
}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
body.dark{--card:#1e3330;--bg:#131f1d;--text:#e0eeec;--sub:#7ab5af;--border:rgba(0,154,147,.2);--border2:rgba(0,154,147,.3);--gold-lt:#2a2000;--teal-lt:#0a2420;--amb-lt:#2a1a00;--red-lt:#2a0f0f;--grn-lt:#0a2018}
.dm-toggle{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.dm-track{width:42px;height:24px;border-radius:12px;background:rgba(0,154,147,.25);position:relative;transition:background .3s;flex-shrink:0}
.dm-track.on{background:var(--teal)}
.dm-thumb{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.dm-track.on .dm-thumb{left:21px}
/* LOGIN */
#loginScreen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:var(--dark);position:relative;overflow:hidden}
#loginScreen::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(0,154,147,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,120,112,.12) 0%,transparent 50%)}
.login-brand{text-align:center;margin-bottom:28px;position:relative;z-index:1}
.login-tagline{font-size:11px;color:rgba(255,255,255,.35);letter-spacing:.18em;text-transform:uppercase;margin-top:10px}
.login-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:24px;width:100%;max-width:360px;position:relative;z-index:1}
.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:24px;background:rgba(0,0,0,.2);padding:4px;border-radius:12px}
.role-tab{padding:10px;border-radius:9px;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;transition:all .2s}
.role-tab.active{background:var(--teal);color:#fff}
.lf{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#fff;font-size:14px;font-family:"DM Sans",sans-serif;margin-bottom:10px;outline:none}
.lf:focus{border-color:var(--teal)}
.lf option{color:var(--text);background:#fff}
.lbtn{width:100%;padding:14px;border-radius:12px;background:var(--teal);color:#fff;border:none;font-size:14px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;margin-top:6px}
.lbtn:active{background:var(--teal-dk)}
.lerr{font-size:12px;color:#f87171;text-align:center;margin-top:10px;min-height:18px}
.pin-label{font-size:12px;color:rgba(255,255,255,.5);text-align:center;margin-bottom:10px}
.pin-dots{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);transition:all .2s}
.pin-dot.filled{background:var(--teal);border-color:var(--teal)}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-key{padding:16px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);background:rgba(255,255,255,.06);color:#fff;font-size:20px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif;text-align:center;transition:all .15s}
.pin-key:active{background:var(--teal);border-color:var(--teal)}
.pin-key.del{font-size:16px;color:rgba(255,255,255,.5)}
.pin-key.ok{background:var(--teal);border-color:var(--teal);font-size:14px}
/* APP */
.notif-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--bg)}
.app{display:none;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
.app.on{display:flex}
.app-hdr{background:var(--dark2);padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06)}
.hdr-brand{font-family:"Playfair Display",serif;font-size:16px;color:#fff;letter-spacing:.04em}
.hdr-user{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px;letter-spacing:.04em}
.hdr-right{display:flex;align-items:center;gap:8px}
.notif-btn{position:relative;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:20px;color:#fff;font-size:14px;padding:5px 10px;cursor:pointer}
.logout-btn{font-size:11px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;cursor:pointer;font-family:"DM Sans",sans-serif;padding:5px 12px}
.app-body{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.btm-nav{background:var(--card);border-top:1px solid var(--border);display:flex;flex-shrink:0;box-shadow:0 -4px 20px rgba(0,154,147,.06)}
.bn{flex:1;padding:11px 4px 9px;text-align:center;cursor:pointer;border:none;background:none;font-family:"DM Sans",sans-serif;color:var(--sub);font-size:10px;display:flex;flex-direction:column;align-items:center;gap:3px;letter-spacing:.02em;position:relative}
.bn.active{color:var(--teal)}
.bn-icon{font-size:17px;line-height:1}
/* COMPONENTS */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--card);border-radius:var(--r);padding:14px 16px;border:.5px solid var(--border);box-shadow:var(--shadow)}
.kpi-l{font-size:11px;color:var(--sub);margin-bottom:4px}
.kpi-v{font-size:22px;font-weight:500;line-height:1.1}
.card{background:var(--card);border-radius:var(--r);border:.5px solid var(--border);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow)}
.card-h{padding:11px 16px;font-size:12px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.card-h.dk{background:var(--dark2);color:#fff}
.card-h.tl{background:var(--teal);color:#fff}
.card-h.pu{background:var(--pur);color:#fff}
.card-h.go{background:#B8860B;color:#fff}
.card-h.rd{background:var(--red);color:#fff}
.row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:.5px solid var(--border);cursor:pointer}
.row:last-child{border:none}
.row:active{background:var(--bg)}
.row.paused{opacity:.45}
.av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;color:#fff;font-family:"Playfair Display",serif}
.ri{flex:1;min-width:0}
.rn{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rs{font-size:10px;color:var(--sub);margin-top:2px}
.bb{background:var(--border);border-radius:3px;height:4px;margin-top:6px}
.bf{height:4px;border-radius:3px;transition:width .5s ease}
.rr{text-align:right;flex-shrink:0}
.pill{display:inline-block;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:500}
.pg{background:#E1F5EE;color:#085041}.pr{background:#FCEBEB;color:#791F1F}
.pa{background:#FAEEDA;color:#633806}.pgr{background:#F1EFE8;color:#444441}
.ppu{background:#EEEDFE;color:#3C3489}
.ir{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:.5px solid var(--border)}
.ir:last-child{border:none}
.il{flex:1;min-width:0;font-size:13px;font-weight:500;color:var(--text)}
.is{display:block;font-size:10px;color:var(--sub);font-weight:400;margin-top:2px}
.inp{border:1.5px solid var(--border2);border-radius:10px;padding:8px 12px;font-size:13px;font-weight:500;background:var(--bg);color:var(--text);text-align:right;font-family:"DM Sans",sans-serif;width:108px;outline:none}
.inp:focus{border-color:var(--teal);background:var(--teal-lt)}
.inp-b{background:#EAF4FF;border-color:#378ADD;color:#0C447C}
.inp-g{background:var(--gold-lt);border-color:var(--amb);color:var(--gold)}
.inp-full{width:100%;text-align:left}
.btn{padding:10px 16px;border-radius:12px;border:.5px solid var(--border2);background:var(--card);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:"DM Sans",sans-serif}
.bteal{background:var(--teal);color:#fff;border:none}
.bred{background:var(--red);color:#fff;border:none}
.bamb{background:var(--amb);color:#fff;border:none}
.bteal:active{background:var(--teal-dk)}
.bred:active{opacity:.85}
.ms{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ms select,.sel-full{flex:1;padding:9px 12px;border-radius:12px;border:1.5px solid var(--border2);background:var(--card);color:var(--text);font-size:13px;font-family:"DM Sans",sans-serif;outline:none}
.ms select:focus,.sel-full:focus{border-color:var(--teal)}
.textarea{width:100%;border:1.5px solid var(--border2);border-radius:12px;padding:12px;font-size:13px;font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--text);resize:none;outline:none;min-height:80px}
.textarea:focus{border-color:var(--teal)}
/* HERO */
.hero{background:linear-gradient(135deg,var(--dark2) 0%,var(--dark3) 100%);border-radius:18px;padding:22px 20px;margin-bottom:12px;color:#fff;position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(0,154,147,.12);top:-60px;right:-40px}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;position:relative}
.hero-name{font-family:"Playfair Display",serif;font-size:20px;margin-bottom:2px}
.hero-sub{font-size:11px;opacity:.5;letter-spacing:.04em}
.month-sel{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;color:#fff;font-size:11px;padding:5px 10px;font-family:"DM Sans",sans-serif;cursor:pointer;outline:none}
.month-sel option{color:var(--text);background:#fff}
.prov-amount{font-family:"Playfair Display",serif;font-size:44px;color:var(--teal-mid);line-height:1;position:relative}
.prov-label{font-size:11px;opacity:.5;margin-top:4px;letter-spacing:.06em;text-transform:uppercase}
.hero-status{display:inline-block;margin-top:14px;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:500}
.hs-good{background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.2)}
.hs-none{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}
.hs-warn{background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.15)}
/* MSG */
.msg-card{background:linear-gradient(135deg,#2f4a45,#1a2e2b);border-radius:16px;padding:18px 20px;margin-bottom:12px;border:.5px solid rgba(0,154,147,.3);position:relative;overflow:hidden}
.msg-card::before{content:"\u201C";position:absolute;font-family:"Playfair Display",serif;font-size:80px;color:rgba(0,154,147,.15);top:-10px;left:10px;line-height:1}
.msg-from{font-size:10px;color:var(--teal-mid);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.msg-text{font-size:14px;color:#e0eeec;line-height:1.6;position:relative;z-index:1}
.msg-date{font-size:10px;color:rgba(255,255,255,.3);margin-top:8px}
/* CHART */
.chart-outer{padding:16px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.chart-bars{display:flex;align-items:flex-end;gap:8px;height:110px;min-width:max-content}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:32px}
.bar-body{border-radius:5px 5px 0 0;width:28px;min-height:3px}
.bar-lbl{font-size:9px;color:var(--sub)}
.bar-val{font-size:9px;font-weight:500;color:var(--text);min-height:12px}
/* QUALS */
.qual-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:.5px solid var(--border)}
.qual-item:last-child{border:none}
.qual-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.qual-info{flex:1}
.qual-name{font-size:13px;font-weight:500}
.qual-date{font-size:10px;color:var(--sub);margin-top:2px}
/* BDAY */
.bday-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:.5px solid var(--border)}
.bday-item:last-child{border:none}
.bday-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#fff;font-family:"Playfair Display",serif;flex-shrink:0}
.bday-info{flex:1}
.bday-name{font-size:13px;font-weight:500}
.bday-date{font-size:10px;color:var(--sub);margin-top:2px}
.bday-days{flex-shrink:0;text-align:right}
.bday-num{font-size:18px;font-weight:500;color:var(--teal);line-height:1}
.bday-lbl{font-size:9px;color:var(--sub)}
.bday-today{background:var(--teal-lt);border-left:3px solid var(--teal)}
/* NOTIF */
.notif-center{background:var(--dark);position:fixed;top:0;left:0;right:0;max-width:480px;margin:0 auto;z-index:400;border-radius:0 0 20px 20px;padding:16px;max-height:60vh;overflow-y:auto;display:none;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.notif-center.on{display:block}
.notif-item{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;margin-bottom:8px;border-left:3px solid var(--teal)}
.notif-item.bday{border-left-color:#fbbf24}
.notif-title{font-size:12px;font-weight:500;color:#fff;margin-bottom:3px}
.notif-body{font-size:11px;color:rgba(255,255,255,.6)}
.notif-time{font-size:10px;color:rgba(255,255,255,.3);margin-top:4px}
.notif-hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.notif-hdr-row span{font-size:13px;font-weight:500;color:#fff}
.notif-close{color:rgba(255,255,255,.5);background:none;border:none;font-size:20px;cursor:pointer}
/* OVERLAY */
.ov{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;overflow-y:auto;max-width:480px;margin:0 auto}
.ov.on{display:block}
.ov-hdr{background:var(--dark2);padding:14px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:10}
.bk{color:#fff;font-size:26px;cursor:pointer;background:none;border:none;font-family:"DM Sans",sans-serif;line-height:1}
.ov-t{color:#fff;font-size:16px;font-weight:500;font-family:"Playfair Display",serif}
.ov-body{padding:14px}
/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--card);border-radius:20px;padding:24px;width:100%;max-width:380px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:"Playfair Display",serif;font-size:18px;margin-bottom:16px;color:var(--text)}
.modal-field{margin-bottom:12px}
.modal-field label{font-size:12px;color:var(--sub);display:block;margin-bottom:5px}
.modal-field input,.modal-field select{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:14px;font-family:"DM Sans",sans-serif;outline:none}
.modal-field input:focus,.modal-field select:focus{border-color:var(--teal)}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
/* INFO */
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 16px;border-bottom:.5px solid var(--border)}
.info-row:last-child{border:none}
.info-label{font-size:12px;color:var(--sub)}
.info-val{font-size:13px;font-weight:500;text-align:right}
.formula-box{background:var(--dark2);border-radius:12px;padding:16px;margin:12px 0;color:#fff}
.fb-title{font-size:11px;opacity:.5;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.fb-formula{font-size:13px;line-height:1.8;opacity:.85}
.fb-highlight{color:var(--teal-mid);font-weight:500}
.section-lbl{font-size:10px;font-weight:500;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;padding:8px 16px 4px;margin-top:4px}
.empty-state{text-align:center;padding:32px 20px;color:var(--sub);font-size:13px}
.badge-paused{background:#FAEEDA;color:#633806;font-size:9px;padding:2px 6px;border-radius:10px;margin-left:6px}
.badge-admin{background:#EEEDFE;color:#3C3489;font-size:9px;padding:2px 6px;border-radius:10px;margin-left:6px}
</style>
<script>
// Service Worker registrieren für PWA-Funktionalität
if("serviceWorker" in navigator){
  const sw=`
    const CACHE='gr-v5';
    self.addEventListener('install',e=>{self.skipWaiting();});
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      if(e.request.method!=='GET')return;
      e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
    });
  `;
  const blob=new Blob([sw],{type:"application/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script></head>

  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(str));

// HELPERS
function activeEMP(){return EMP.filter(e=>e.active!==false);}
function gD(id,m){const mo=m||curM;if(!mD[mo])mD[mo]={};if(!mD[mo][id])mD[mo][id]={u:0,lz:0};return mD[mo][id];}
function setU(id,v){gD(id).u=parseFloat(v)||0;save();checkProvisionNotif(id);rc();}
function setLz(id,v){gD(id).lz=parseFloat(v)||0;save();rc();}
function gLkq(emp){return lkqOv[emp.id]||emp.lkq||cfg.defLkq;}
function gZiel(emp){return zOv[emp.id]||Math.round((emp.g+emp.fw)/gLkq(emp)*100);}
function calc(emp,m){
  const d=gD(emp.id,m);const ist=d.u||0,lz=d.lz||0;
  const ziel=gZiel(emp);const diff=ist-ziel;
  const prov=ist>0?Math.max(0,Math.round((diff-ziel*cfg.provS/100)*cfg.provP/100)):0;
  const istLkq=ist>0?Math.round((emp.g+emp.fw)/ist*100):null;
  const stl=+(emp.g/emp.h/4.33).toFixed(2);
  const tSlots=Math.round(cfg.aT*cfg.sT*(emp.h/40));
  const lzP=tSlots>0&&lz>0?Math.round(lz/tSlots*100):null;
  const aus=tSlots>0&&lz>0?Math.round((tSlots-lz)/tSlots*100):null;
  let st="kein Umsatz",sc="pgr";
  if(ist>0){if(diff>=0){st="Ziel erreicht ✓";sc="pg";}else if(diff>=-ziel*.1){st="knapp";sc="pa";}else{st="unter Ziel";sc="pr";}}
  return{ist,ziel,diff,prov,istLkq,stl,lzP,aus,st,sc};
}
function eur(n){return Number(n).toLocaleString("de-DE",{minimumFractionDigits:0,maximumFractionDigits:0})+" €";}
function ini(n){return n.split(" ").map(w=>w[0]).join("").substring(0,2).toUpperCase();}
function avc(id){return AC[id%AC.length];}
function ds(d){return d>0?"+"+eur(d):eur(d);}

// DATE HELPERS
function parseDt(s){const p=s.split(".");return{d:+p[0],m:+p[1],y:+p[2]};}
function daysUntilBday(g){
  if(!g)return 999;
  try{const now=new Date();const{d,m}=parseDt(g);const next=new Date(now.getFullYear(),m-1,d);if(next<now)next.setFullYear(now.getFullYear()+1);return Math.round((next-now)/86400000);}catch(e){return 999;}
}
function nextBdayStr(g){
  if(!g)return"—";
  try{const now=new Date();const{d,m}=parseDt(g);const next=new Date(now.getFullYear(),m-1,d);if(next<now)next.setFullYear(now.getFullYear()+1);return next.toLocaleDateString("de-DE",{day:"2-digit",month:"long"});}catch(e){return"—";}
}
function currentAge(g){
  if(!g)return 0;
  try{const{d,m,y}=parseDt(g);const now=new Date();let age=now.getFullYear()-y;if(now<new Date(now.getFullYear(),m-1,d))age--;return age;}catch(e){return 0;}
}
function yearsAtCompany(e){
  if(!e)return 0;
  try{const{d,m,y}=parseDt(e);const now=new Date();let yrs=now.getFullYear()-y;if(now<new Date(now.getFullYear(),m-1,d))yrs--;return Math.max(0,yrs);}catch(e){return 0;}
}

function checkProvisionNotif(id){
  const emp=EMP.find(e=>e.id===id);if(!emp)return;
  const c=calc(emp);
  if(c.prov>0){
    const key="prov_"+id+"_"+curM;
    if(!notifs.find(n=>n.key===key)){
      notifs.unshift({key,type:"prov",title:"Provision verfügbar! 🎉",body:emp.n+" hat im "+curM+" eine Provision von "+eur(c.prov)+" erreicht.",time:new Date().toLocaleDateString("de-DE"),read:false,forId:id});
      save();updateNotifBadge();
    }
  }
}
function addBdayNotifs(){
  EMP.forEach(emp=>{
    const days=daysUntilBday(emp.geb);
    if(days<=7){
      const key="bday_"+emp.id+"_"+new Date().getFullYear();
      if(!notifs.find(n=>n.key===key)){
        const msg=days===0?"Heute hat "+emp.n+" Geburtstag! 🎂":emp.n+" hat in "+days+" Tag"+(days===1?"":"en")+" Geburtstag";
        notifs.unshift({key,type:"bday",title:"Geburtstag",body:msg,time:new Date().toLocaleDateString("de-DE"),read:false,forId:0});
        save();

    }
  });

// ── WEBAUTHN / FINGERABDRUCK ─────────────────────────────────────────
const WA_RP={name:"Dein Gesundheitsreich",id:location.hostname||"localhost"};
function b64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");}
function str2ab(str){return Uint8Array.from(atob(str.replace(/-/g,"+").replace(/_/g,"/")),c=>c.charCodeAt(0)).buffer;}

async function registerFingerprint(empId){
  if(!window.PublicKeyCredential){alert("Dein Gerät unterstützt keine biometrische Authentifizierung.");return;}
  try{
    const emp=EMP.find(e=>e.id===empId);if(!emp)return;
    const cred=await navigator.credentials.create({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      rp:WA_RP,
      user:{id:new TextEncoder().encode("emp_"+empId),name:emp.n,displayName:emp.n},
      pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],
      authenticatorSelection:{userVerification:"required",residentKey:"preferred"},
      timeout:60000
    }});
    if(!emp.waCredId)emp.waCredId=[];
    emp.waCredId.push(b64url(cred.rawId));
    save();
    return true;
  }catch(e){
    if(e.name!=="NotAllowedError")alert("Fingerabdruck konnte nicht registriert werden: "+e.message);
    return false;
  }
}

async function loginWithFingerprint(){
  if(!window.PublicKeyCredential)return;
  const empsWithWA=EMP.filter(e=>e.waCredId&&e.waCredId.length);
  if(!empsWithWA.length)return;
  try{
    const allowCreds=empsWithWA.flatMap(e=>e.waCredId.map(id=>({type:"public-key",id:str2ab(id)})));
    const assertion=await navigator.credentials.get({publicKey:{
      challenge:crypto.getRandomValues(new Uint8Array(32)),
      allowCredentials:allowCreds,
      userVerification:"required",
      timeout:60000
    }});
    const credId=b64url(assertion.rawId);
    const emp=empsWithWA.find(e=>e.waCredId.includes(credId));
    if(emp){startMa(emp);}
    else{document.getElementById("loginErr").textContent="Fingerabdruck nicht erkannt.";}
  }catch(e){
    if(e.name!=="NotAllowedError")console.log("WebAuthn:",e.message);
  }
}

async function saveMA(){
  const n=document.getElementById("mfName").value.trim();
  const h=parseFloat(document.getElementById("mfH").value)||40;
  const g=parseFloat(document.getElementById("mfG").value)||0;
  const pin=document.getElementById("mfPin").value.trim();
  if(!n){alert("Bitte Name eingeben.");return;}
  // PIN required for new MA, optional when editing (blank = keep existing)
  if(!editingMAId&&(!pin||pin.length!==4)){alert("Bitte 4-stellige PIN eingeben.");return;}
  if(pin&&pin.length!==4){alert("PIN muss genau 4 Stellen haben.");return;}
  const pinHash=pin?await sha256(pin):null;
  if(editingMAId){
    const idx=EMP.findIndex(e=>e.id===editingMAId);
    if(idx>=0){
      EMP[idx]={...EMP[idx],
        n,o:document.getElementById("mfOrt").value,h,g,
        s:document.getElementById("mfS").value,
        lkq:parseFloat(document.getElementById("mfLkq").value)||40,
        geb:document.getElementById("mfGeb").value,
        eintr:document.getElementById("mfEintr").value,
        fw:parseFloat(document.getElementById("mfFw").value)||0,
        ...(pinHash&&{pinHash})
      };
    }

      <div class="bar-lbl" style="${isNow?"color:var(--teal);font-weight:500":""}">${m.substring(0,3)}</div>
    </div>`;
  });
  h+=`</div></div></div>
  <div class="card"><div class="card-h tl">Provision 2026</div>
    <div class="chart-outer"><div class="chart-bars">`;
  MN.forEach((m,i)=>{

function rMaFortb(){

  if(!quals[emp.id])quals[emp.id]={done:[]};
  const done=quals[emp.id].done||[];
  const totalBonus=QUALS.filter(q=>done.includes(q.id)).reduce((s,q)=>s+q.bonus,0);
  let h=`<div class="kpi-grid">
    <div class="kpi"><div class="kpi-l">Abgeschlossen</div><div class="kpi-v" style="color:var(--teal)">${done.length} / ${QUALS.length}</div></div>
    <div class="kpi"><div class="kpi-l">Gehalts-Bonus aktiv</div><div class="kpi-v" style="color:var(--grn)">${eur(totalBonus)}</div></div>
  </div>
  <div class="card"><div class="card-h tl">Qualifikationen & Fortbildungen</div>`;
  QUALS.forEach(q=>{
    const isDone=done.includes(q.id);

      <div class="qual-icon" style="background:${isDone?'var(--teal-lt)':'var(--bg)'}">${q.icon}</div>

  h+=`</div><div style="padding:12px 0;font-size:12px;color:var(--sub);text-align:center">Qualifikationen werden vom Chef eingetragen.</div>`;

}

    <div class="info-row"><span class="info-label">Umsatzziel</span><span class="info-val" style="color:var(--teal)">${eur(ziel)}</span></div>
    <div class="info-row"><span class="info-label">Im Team seit</span><span class="info-val">${emp.eintr||"—"}${yrs>0?" ("+yrs+"J)":""}</span></div>

    </div>
  </div>`;
  document.getElementById("maBody").innerHTML=h;
}

function saveM(){

function rc(){

    if(role==="chef"){
      if(curCT==="dash")rChefDash();

      else if(curCT==="msg")rChefMsg();

<script>
// ── FIREBASE SYNC ─────────────────────────────────────────────────────
// Override save/load to use Firebase instead of localStorage
const DB_PATH = 'gesundheitsreich';

function save() {
  try {
    // Save to localStorage as backup
    localStorage.setItem('gr_EMP', JSON.stringify(EMP));
    localStorage.setItem('gr_ADMINS', JSON.stringify(ADMINS));
    localStorage.setItem('gr_mD', JSON.stringify(mD));
    localStorage.setItem('gr_lkqOv', JSON.stringify(lkqOv));
    localStorage.setItem('gr_zOv', JSON.stringify(zOv));
    localStorage.setItem('gr_cfg', JSON.stringify(cfg));
    localStorage.setItem('gr_msgs', JSON.stringify(msgs));
    localStorage.setItem('gr_quals', JSON.stringify(quals));
    localStorage.setItem('gr_notifs', JSON.stringify(notifs));
    // Also save to Firebase
    if (window.db) {
      window.db.ref(DB_PATH).set({
        EMP: JSON.stringify(EMP),
        ADMINS: JSON.stringify(ADMINS),
        mD: JSON.stringify(mD),
        lkqOv: JSON.stringify(lkqOv),
        zOv: JSON.stringify(zOv),
        cfg: JSON.stringify(cfg),
        msgs: JSON.stringify(msgs),
        quals: JSON.stringify(quals)
      });
    }
  } catch(e) { console.error('Save error:', e); }
}

function load() {
  // First load from localStorage (instant)
  try {
    const e=localStorage.getItem('gr_EMP'); if(e) EMP=JSON.parse(e);
    const a=localStorage.getItem('gr_ADMINS'); if(a){const p=JSON.parse(a);if(p&&p.length&&p[0].id==="admin_chef")ADMINS=p;}
    const d=localStorage.getItem('gr_mD'); if(d) mD=JSON.parse(d);
    const l=localStorage.getItem('gr_lkqOv'); if(l) lkqOv=JSON.parse(l);
    const z=localStorage.getItem('gr_zOv'); if(z) zOv=JSON.parse(z);
    const c=localStorage.getItem('gr_cfg'); if(c) cfg=JSON.parse(c);
    const m=localStorage.getItem('gr_msgs'); if(m) msgs=JSON.parse(m);
    const q=localStorage.getItem('gr_quals'); if(q) quals=JSON.parse(q);
    const n=localStorage.getItem('gr_notifs'); if(n) notifs=JSON.parse(n);
  } catch(e) {}

  // Then sync from Firebase (live updates)
  if (window.db) {
    window.db.ref(DB_PATH).on('value', snapshot => {
      const data = snapshot.val();
      if (!data) return;
      try {
        if (data.EMP) { const p=JSON.parse(data.EMP); if(p&&p.length) EMP=p; }
        if (data.ADMINS) {
          const p=JSON.parse(data.ADMINS);
          // Reset to new single-chef format if old multi-admin data found
          if(p&&p.length&&p[0].id==="admin_chef") ADMINS=p;
          else { ADMINS=[...DEFAULT_ADMINS]; save(); }
        }
        if (data.mD) mD=JSON.parse(data.mD);
        if (data.lkqOv) lkqOv=JSON.parse(data.lkqOv);
        if (data.zOv) zOv=JSON.parse(data.zOv);
        if (data.cfg) cfg=JSON.parse(data.cfg);
        if (data.msgs) msgs=JSON.parse(data.msgs);
        if (data.quals) quals=JSON.parse(data.quals);
        // Update localStorage cache
        localStorage.setItem('gr_EMP',data.EMP||'[]');
        localStorage.setItem('gr_mD',data.mD||'{}');
        localStorage.setItem('gr_msgs',data.msgs||'{}');
        localStorage.setItem('gr_quals',data.quals||'{}');
        // Re-render if logged in
        if (typeof rc === 'function') rc();
        if (typeof buildSelects === 'function') buildSelects();
        updateNotifBadge();
      } catch(e) { console.error('Firebase sync error:', e); }
    });
  }
}
</script>
